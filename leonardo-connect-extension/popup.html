<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 330px; font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #0f1115; color: #e6e6e6; }
    h1 { font-size: 15px; margin: 0 0 4px; }
    .sub { font-size: 11px; color: #8a91a0; margin: 0 0 10px; }
    label { font-size: 11px; color: #9aa; display: block; margin: 10px 0 3px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #2a2f3a; background: #161a22; color: #e6e6e6; font-size: 12px; }
    button { width: 100%; margin-top: 14px; padding: 10px; border: 0; border-radius: 7px; background: #6d5efc; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    #status { margin-top: 12px; font-size: 12px; white-space: pre-wrap; line-height: 1.45; }
    .ok { color: #5fd07f; } .err { color: #ff6b6b; } .muted { color: #8a91a0; }
    .row { font-size: 11px; color: #8a91a0; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Leonardo Connect</h1>
  <p class="sub">GenityBoost · link your Leonardo account</p>
  <div class="row">1. Log in at app.leonardo.ai. 2. Paste your connect token. 3. Click Connect.</div>

  <label>Server</label>
  <input id="endpoint" value="https://api.genityboost.site" readonly disabled />

  <label>Connect token (from your dashboard)</label>
  <input id="ctoken" placeholder="connect_xxx" />

  <button id="btn">Connect this account</button>
  <div id="status" class="muted">Ready.</div>

  <script src="popup.js"></script>
</body>
</html>
